        :root {
            --cursor-size: 20px;
            --cursor-hover-size: 60px;
        }
        
        * {
            cursor: none;
        }
        
        @media (max-width: 768px) {
            * { cursor: auto; }
        }

        body {
            background-color: #050A14;
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Cursor */
        .cursor-dot,
        .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }
        
        .cursor-dot {
            width: 8px;
            height: 8px;
            background: #3B82F6;
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }
        
        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(59, 130, 246, 0.5);
            transition: width 0.3s, height 0.3s, border-color 0.3s;
        }
        
        .cursor-hover .cursor-dot {
            width: 12px;
            height: 12px;
            background: #06B6D4;
        }
        
        .cursor-hover .cursor-outline {
            width: 60px;
            height: 60px;
            border-color: rgba(6, 182, 212, 0.3);
            background: rgba(6, 182, 212, 0.05);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050A14; }
        ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3B82F6; }

        /* Noise Texture */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* Gradient Mesh Background */
        .gradient-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(6, 182, 212, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(139, 92, 246, 0.08) 0px, transparent 50%);
            animation: meshMove 20s ease infinite alternate;
        }
        
        @keyframes meshMove {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(2deg); }
        }

        /* Glass */
        .glass-premium {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.36);
        }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 20px 40px -15px rgba(59, 130, 246, 0.2), inset 0 1px 0 rgba(255,255,255,0.1);
            transform: translateY(-8px);
        }

        /* Text Effects */
        .text-gradient {
            background: linear-gradient(135deg, #60A5FA 0%, #3B82F6 30%, #06B6D4 70%, #22D3EE 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 5s ease infinite;
        }
        
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glow-text {
            text-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
        }

        /* Magnetic Button */
        .magnetic-btn {
            position: relative;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .magnetic-btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: linear-gradient(135deg, #3B82F6, #06B6D4);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
            filter: blur(8px);
        }
        
        .magnetic-btn:hover::before {
            opacity: 0.6;
        }

        /* Reveal Animations */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        .reveal-left {
            opacity: 0;
            transform: translateX(-60px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .reveal-left.active {
            opacity: 1;
            transform: translateX(0);
        }
        
        .reveal-scale {
            opacity: 0;
            transform: scale(0.8);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .reveal-scale.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Floating Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }
        
        @keyframes floatSlow {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(-1deg); }
        }
        
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-float-slow { animation: floatSlow 8s ease-in-out infinite; }

        /* Particle Canvas */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Loading */
        .loader-container {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #050A14;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s, visibility 0.8s;
        }
        
        .loader-container.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loader-ring {
            width: 60px;
            height: 60px;
            border: 2px solid transparent;
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loader-ring::before {
            content: '';
            position: absolute;
            inset: -10px;
            border: 2px solid transparent;
            border-bottom-color: #06B6D4;
            border-radius: 50%;
            animation: spin 2s linear infinite reverse;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Progress Bar Glow */
        .progress-glow {
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        /* Timeline */
        .timeline-modern::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #3B82F6, #06B6D4, transparent);
        }
        
        @media (min-width: 768px) {
            .timeline-modern::before {
                left: 50%;
                transform: translateX(-50%);
            }
        }

        /* Scroll Indicator */
        .scroll-line {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, transparent, #3B82F6, transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }
        
        @keyframes scrollPulse {
            0%, 100% { opacity: 0.3; transform: scaleY(0.5); }
            50% { opacity: 1; transform: scaleY(1); }
        }

        /* Section divider */
        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59,130,246,0.3), transparent);
            margin: 0 auto;
            max-width: 200px;
        }

        /* Biodata card hover */
        .biodata-card {
            transition: all 0.3s ease;
        }
        .biodata-card:hover {
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-4px);
            background: rgba(30, 41, 59, 0.5);
        }
    </style>
</head>

        const useScrollReveal = (options = {}) => {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);
            
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsVisible(true);
                        observer.unobserve(entry.target);
                    }
                }, { threshold: 0.15, ...options });
                
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            
            return [ref, isVisible];
        };

        const useCountUp = (end, duration = 2000) => {
            const [count, setCount] = useState(0);
            const [ref, isVisible] = useScrollReveal();
            
            useEffect(() => {
                if (!isVisible) return;
                let startTime = null;
                const step = (timestamp) => {
                    if (!startTime) startTime = timestamp;
                    const progress = Math.min((timestamp - startTime) / duration, 1);
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    setCount(Math.floor(easeOut * end));
                    if (progress < 1) requestAnimationFrame(step);
                };
                requestAnimationFrame(step);
            }, [isVisible, end, duration]);
            
            return [count, ref];
        };

        // --- Particle System ---
        const ParticleCanvas = () => {
            const canvasRef = useRef(null);
            
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let particles = [];
                let animationId;
                
                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                resize();
                window.addEventListener('resize', resize);
                
                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.size = Math.random() * 2 + 0.5;
                        this.speedX = Math.random() * 0.5 - 0.25;
                        this.speedY = Math.random() * 0.5 - 0.25;
                        this.opacity = Math.random() * 0.5 + 0.1;
                    }
                    update() {
                        this.x += this.speedX;
                        this.y += this.speedY;
                        if (this.x > canvas.width) this.x = 0;
                        if (this.x < 0) this.x = canvas.width;
                        if (this.y > canvas.height) this.y = 0;
                        if (this.y < 0) this.y = canvas.height;
                    }
                    draw() {
                        ctx.fillStyle = `rgba(59, 130, 246, ${this.opacity})`;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                
                for (let i = 0; i < 50; i++) particles.push(new Particle());
                
                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => {
                        p.update();
                        p.draw();
                    });
                    
                    particles.forEach((a, i) => {
                        particles.slice(i + 1).forEach(b => {
                            const dx = a.x - b.x;
                            const dy = a.y - b.y;
                            const distance = Math.sqrt(dx * dx + dy * dy);
                            if (distance < 150) {
                                ctx.strokeStyle = `rgba(59, 130, 246, ${0.1 * (1 - distance / 150)})`;
                                ctx.lineWidth = 0.5;
                                ctx.beginPath();
                                ctx.moveTo(a.x, a.y);
                                ctx.lineTo(b.x, b.y);
                                ctx.stroke();
                            }
                        });
                    });
                    
                    animationId = requestAnimationFrame(animate);
                };
                animate();
                
                return () => {
                    cancelAnimationFrame(animationId);
                    window.removeEventListener('resize', resize);
                };
            }, []);
            
            return <canvas ref={canvasRef} id="particle-canvas" />;

            useEffect(() => {
                const dot = dotRef.current;
                const outline = outlineRef.current;
                if (!dot || !outline) return;
                
                let mouseX = 0, mouseY = 0;
                let outlineX = 0, outlineY = 0;
                
                const handleMouseMove = (e) => {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                    dot.style.left = `${mouseX}px`;
                    dot.style.top = `${mouseY}px`;
                };
                
                const animate = () => {
                    outlineX += (mouseX - outlineX) * 0.15;
                    outlineY += (mouseY - outlineY) * 0.15;
                    outline.style.left = `${outlineX}px`;
                    outline.style.top = `${outlineY}px`;
                    requestAnimationFrame(animate);
                };
                
                const handleMouseEnter = () => document.body.classList.add('cursor-hover');
                const handleMouseLeave = () => document.body.classList.remove('cursor-hover');
                
                window.addEventListener('mousemove', handleMouseMove);
                animate();
                
                const interactiveElements = document.querySelectorAll('a, button, input, textarea, .glass-card, .biodata-card');
                interactiveElements.forEach(el => {
                    el.addEventListener('mouseenter', handleMouseEnter);
                    el.addEventListener('mouseleave', handleMouseLeave);
                });
                
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                };
            }, []);
            
            return (
                <>

                    <div ref={outlineRef} className="cursor-outline hidden md:block" />
